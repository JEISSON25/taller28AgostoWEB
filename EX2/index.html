<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EX2 - Mini Calculadora Segura</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
</head>
<body>
  <h1>Mini Calculadora Segura</h1>

  <form id="calcForm">
    <input type="number" id="num1" placeholder="Número 1">
    <select id="operacion">
      <option value="+">+</option>
      <option value="-">-</option>
      <option value="*">×</option>
      <option value="/">÷</option>
    </select>
    <input type="number" id="num2" placeholder="Número 2">
    <button type="submit">Calcular</button>
  </form>

  <h2>Resultado:</h2>
  <p id="resultado"></p>

  <h2>Historial:</h2>
  <ul id="historial"></ul>

  <script src="app.js"></script>
</body>
</html>
